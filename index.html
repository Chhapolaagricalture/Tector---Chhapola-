<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhapola Agriculture</title>

<link rel="stylesheet" href="Style.css">
</head>

<body>

<header>
<h2>🚜 Chhapola Agriculture</h2>
<p>Tractor Account System</p>
</header>

<div class="container">
  <input id="search" type="text" placeholder="🔍 किसान खोजें" onkeyup="show()">

<div id="summary" class="card"></div>

<input id="name" placeholder="किसान का नाम">

<select id="work">
<option>जुताई</option>
<option>बुवाई</option>
<option>रोटावेटर</option>
<option>कल्टीवेटर</option>
</select>

<input id="bigha" type="number" placeholder="बीघा">

<input id="rate" type="number" placeholder="रेट (₹/बीघा)">

<input id="paid" type="number" placeholder="जमा राशि">

<button onclick="save()">💾 हिसाब सेव करें</button>

<div id="list"></div>

</div>

<script src="Script.js"></script>

</body>
</html>
