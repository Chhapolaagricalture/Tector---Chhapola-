<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhapola Agriculture</title>

<link rel="stylesheet" href="Style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

<header>
<h2>🚜 Chhapola Agriculture</h2>
<p>Tractor Account System</p>
</header>

<div class="container">
  <div style="display:flex;gap:8px;">
    <input id="search" type="text" placeholder="🔎 किसान खोजें">
    <button onclick="show()">🔍 Search</button>
</div>

<div id="summary" class="card"></div>

<input id="name" placeholder="किसान का नाम">
<label>Date</label>
<input type="date" id="date">

<label>Mobile Number</label>
<input type="tel" id="mobile" placeholder="9079096875">
<select id="work">
<option>herow</option>
<option>kalti</option>
<option>morplau</option>
<option>tharesare</option>
</select>

<input id="bigha" type="number" placeholder="बीघा">

<input id="rate" type="number" placeholder="रेट (₹/बीघा)">

<input id="paid" type="number" placeholder="जमा राशि">

<button onclick="save()">💾 हिसाब सेव करें</button>
<div id="dashboard" class="dashboard"></div>
<div id="list"></div>

</div>

<script src="Script.js"></script>

</body>
</html>
