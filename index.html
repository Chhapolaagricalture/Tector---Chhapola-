<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhapola Agriculture</title>

<link rel="stylesheet" href="Style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192-v2.png">
<link rel="apple-touch-icon" href="icon-512-v2.png">
</head>
<body>
<div id="loginBox" class="card">
  <h2>🔐 Admin Login</h2>

  <input
    type="email"
    id="email"
    placeholder="Enter Email"
  >

  <input
    type="password"
    id="password"
    placeholder="Enter Password"
  >

  <button onclick="login()">Login</button>

  <br><br>

  <a href="#" onclick="forgotPassword()">Forgot Password?</a>
</div>
 

<div id="mainApp" style="display:none;">

<!-- यहाँ पूरी वेबसाइट का कोड रहेगा -->

<button onclick="logout()">🚪 Logout</button>
<button onclick="changePassword()">🔑 Change Password</button>
<header>
<h2>🚜 Chhapola Agriculture</h2>
<p>Tractor Account System</p>
</header>

<div class="container">
  <div style="display:flex;gap:8px;">
    <input id="search" type="text" placeholder="🔎 किसान खोजें">
    <button onclick="show()">🔍 Search</button>
</div>
  <div style="display:flex; gap:8px; align-items:center; margin:10px 0; flex-wrap:wrap;">
    <label>From</label>
    <input type="date" id="fromDate">

    <label>To</label>
    <input type="date" id="toDate">

    <button onclick="show()">Filter</button>
    <button onclick="
        document.getElementById('fromDate').value='';
        document.getElementById('toDate').value='';
        show();
    ">Clear</button>
</div>
<div class="dashboard">

  <div class="card">
    <h3>👨‍🌾 Total Farmers</h3>
    <h2 id="totalFarmers">0</h2>
  </div>

  <div class="card">
    <h3>💰 Total Income</h3>
    <h2 id="totalIncome">₹0</h2>
  </div>

  <div class="card">
    <h3>💸 Total Pending</h3>
    <h2 id="totalPending">₹0</h2>
  </div>

  <div class="card">
    <h3>📅 Today's Income</h3>
    <h2 id="todayIncome">₹0</h2>
  </div>

</div>
<div id="summary" class="card"></div>

<input id="name" placeholder="किसान का नाम">
<label>Date</label>
<input type="date" id="date">

<label>Mobile Number</label>
<input type="tel" id="mobile" placeholder="9079096875">
<select id="work">
<option value="">Select Work</option>
<option value="Hero">Hero</option>
<option value="Calti">Calti</option>
 <option value="Mej (Pata)">Mej (Pata)</option>
  <option value="Pending Balance">Pending Balance</option>
<option value="Morplau">Morplau</option>
<option value="Displau">Displau</option>
<option value="Thresher">Thresher</option>
<option value="Spray Machine">Spray Machine</option>
</select>
<div id="cropBox" style="display:none;">
  <label>🌾 Crop</label>
  <select id="crop">
    <option value="">Select Crop</option>
    <option value="Chana">Chana</option>
    <option value="Moong">Moong</option>
    <option value="Moth">Moth</option>
    <option value="Sarso">Sarso</option>
    <option value="Guar">Guar</option>
    <option value="Masur">Masur</option>
    <option value="Gehu">Gehu</option>
    <option value="Jau">Jau</option>
    <option value="Bajra">Bajra</option>
    <option value="Makka">Makka</option>
    <option value="Til">Til</option>
    <option value="Kapas">Kapas</option>
    <option value="Other">Other</option>
  </select>
  </div>
  <div id="unitBox" style="display:none;">
  <label id="unitLabel">Hours</label>
  <input type="number" id="unitValue" placeholder="Enter Value">
  </div>
  <div id="timeBox" style="display:none;">
  <label>Time</label>

  <input type="number" id="hours" placeholder="Hours">

  <input type="number" id="minutes" placeholder="Minutes" min="0" max="59">
</div>
<input id="bigha" type="number" placeholder="बीघा">

<input id="rate" type="number" placeholder="रेट (₹/बीघा)">

<input id="paid" type="number" placeholder="जमा राशि">

<button onclick="save()">💾 हिसाब सेव करें</button>
<div id="dashboard" class="dashboard"></div>
<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  onAuthStateChanged,
  signOut,
  updatePassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
  
const firebaseConfig = {
  apiKey: "AIzaSyDJiW2pdtRFOtz__jAhZl7tYd4rQmmlUwA",
  authDomain: "chhapola-agriculture-e7313.firebaseapp.com",
  projectId: "chhapola-agriculture-e7313",
  storageBucket: "chhapola-agriculture-e7313.firebasestorage.app",
  messagingSenderId: "717143487417",
  appId: "1:717143487417:web:cabdec68e69ac794197c68",
  measurementId: "G-YZPYMQEDMC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.db = db;
window.auth = auth;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
  window.sendPasswordResetEmail = sendPasswordResetEmail;
window.onAuthStateChanged = onAuthStateChanged;
window.signOut = signOut;
window.updatePassword = updatePassword;
</script>
</div>
<script type="module" src="Script.js"></script>
  
</body>
    </html>
